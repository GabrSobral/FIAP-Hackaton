name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test-dotnet:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore src/fiap-hackaton.sln

      - name: Build
        run: dotnet build src/fiap-hackaton.sln --no-restore --configuration Release

      - name: Run tests
        run: >
          dotnet test src/fiap-hackaton.Tests/fiap-hackaton.Tests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: ./test-results/*.trx

  test-ia-service:
    name: Test ia-service (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r ia-service/requirements-test.txt

      - name: Run tests
        working-directory: ia-service
        run: pytest --tb=short --junitxml=../test-results/ia-service.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ia-service-test-results
          path: ./test-results/ia-service.xml

  deploy:
    name: Deploy — Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-and-test-dotnet, test-ia-service]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
