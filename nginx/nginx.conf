events {
    worker_connections 1024;
}

http {
    client_max_body_size 10m;

    upstream api {
        server api:8080;
    }

    upstream report-service {
        server report-service:8080;
    }

    server {
        listen 80;

        # SSE: buffering must be disabled for Server-Sent Events to stream correctly
        location = /api/v1/analyses/stream {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        '';
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 86400s;
        }

        # Reports microservice — must come before the general /api/v1/ block
        location /api/v1/reports/ {
            proxy_pass       http://report-service;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # All other API routes
        location /api/v1/ {
            proxy_pass       http://api;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check
        location = /health {
            proxy_pass       http://api;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Block development-only routes
        location ~* ^/(openapi|scalar) {
            return 404;
        }

        # Block everything else
        location / {
            return 404;
        }
    }
}
