version: "3.9"

services:
  nginx:
    image: nginx:alpine
    container_name: fiap-hackaton-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api
      - report-service
    restart: unless-stopped

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: fiap-hackaton-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PostgreSql: "Host=postgres-api;Port=5432;Database=fiap_hackaton;Username=postgres;Password=postgres"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
      RabbitMQ__ExchangeName: fiap-hackaton-exchange
      FileStorage__BasePath: /app/uploads
      Cors__AllowedOrigins__0: "http://localhost"
      Cors__AllowedOrigins__1: "http://localhost:3000"
      Cors__AllowedOrigins__2: "http://127.0.0.1:5500"
      # Local AI service (highest priority — uncomment to use instead of Claude)
      # LocalAi__BaseUrl: http://ia-service:8000
      # Gemini (uncomment to use instead of Claude)
      # Gemini__ApiKey: <your-gemini-key-here>
      # Gemini__Model: gemini-2.0-flash
      # Claude / Anthropic (active)
      Anthropic__ApiKey: 
      Anthropic__Model: claude-sonnet-4-6
      # OpenAI (fallback) — only used if Gemini key is absent
      # OpenAI__ApiKey: <your-openai-key-here>
      # OpenAI__Model: gpt-4o
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres-api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  analysis-worker:
    build:
      context: .
      dockerfile: services/analysis-worker/Dockerfile
    container_name: fiap-hackaton-analysis-worker
    environment:
      ConnectionStrings__PostgreSql: "Host=postgres-api;Port=5432;Database=fiap_hackaton;Username=postgres;Password=postgres"
      ConnectionStrings__WorkerDb: "Host=postgres-worker;Port=5432;Database=worker_db;Username=postgres;Password=postgres"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
      RabbitMQ__ExchangeName: fiap-hackaton-exchange
      # LocalAi__BaseUrl: http://ia-service:8000
      Anthropic__ApiKey: 
      Anthropic__Model: claude-sonnet-4-6
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres-api:
        condition: service_healthy
      postgres-worker:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  report-service:
    build:
      context: .
      dockerfile: services/report-service/Dockerfile
    container_name: fiap-hackaton-report-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__WorkerDb: "Host=postgres-worker;Port=5432;Database=worker_db;Username=postgres;Password=postgres"
      Cors__AllowedOrigins__0: "http://localhost"
      Cors__AllowedOrigins__1: "http://localhost:3000"
      Cors__AllowedOrigins__2: "http://127.0.0.1:5500"
    depends_on:
      postgres-worker:
        condition: service_healthy
    restart: unless-stopped

  ia-service:
    build:
      context: ./services/ia-service
      dockerfile: Dockerfile
    container_name: fiap-hackaton-ia
    environment:
      # Qwen2-VL-2B: good balance of quality and speed (~4 GB download)
      MODEL_ID: Qwen/Qwen2-VL-2B-Instruct
      # Switch to 7B for better quality (needs 8 GB+ VRAM or 16 GB+ RAM):
      # MODEL_ID: Qwen/Qwen2-VL-7B-Instruct
      DEVICE: auto
      MAX_NEW_TOKENS: "1024"
      LOAD_IN_4BIT: "false"
    volumes:
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped

  postgres-api:
    image: postgres:16-alpine
    container_name: fiap-hackaton-postgres-api
    environment:
      POSTGRES_DB: fiap_hackaton
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata-api:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres-worker:
    image: postgres:16-alpine
    container_name: fiap-hackaton-postgres-worker
    environment:
      POSTGRES_DB: worker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata-worker:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: fiap-hackaton-rabbitmq
    ports:
      - "15672:15672"   # management UI — dev only
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata-api:
  pgdata-worker:
  uploads:
  hf_cache:
